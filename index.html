<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>音声ガイド</title>
<style>
  :root{
    --bg:#10141a; --panel:#1a212b; --line:#2b3542;
    --ink:#e8edf3; --sub:#8b97a6; --start:#4fd1a5; --stop:#f0715a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{
    background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
    min-height:100dvh;display:flex;flex-direction:column;justify-content:center;
    gap:16px;padding:24px;max-width:420px;margin:0 auto;
  }
  .play{
    width:100%;padding:28px 16px;border-radius:14px;
    background:var(--panel);border:1px solid var(--line);border-left-width:5px;
    color:var(--ink);font-size:1.15rem;font-weight:700;font-family:inherit;cursor:pointer;
  }
  .play:active{filter:brightness(1.3)}
  #btnStart{border-left-color:var(--start)}
  #btnStop{border-left-color:var(--stop)}
  .method-label{font-size:.72rem;color:var(--sub);letter-spacing:.08em;margin-top:8px}
  .seg{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .seg button{
    flex:1;padding:12px 4px;background:var(--panel);color:var(--sub);
    border:none;font-size:.82rem;font-weight:600;font-family:inherit;cursor:pointer;
  }
  .seg button.active{background:var(--ink);color:var(--bg)}
</style>
</head>
<body>

<button class="play" id="btnStart">▶ 録音を始めます</button>
<button class="play" id="btnStop">■ 録音を停止します</button>

<p class="method-label">再生方法</p>
<div class="seg" role="group" aria-label="再生方法">
  <button id="mAudio" class="active">audio</button>
  <button id="mVideo">video</button>
  <button id="mWebAudio">Web Audio</button>
</div>

<script>
(function(){
  "use strict";
  var method = "audio";
  var ctx = null, bufs = {};
  var els = {
    audio:{ start: document.getElementById("audStart"), stop: document.getElementById("audStop") },
    video:{ start: document.getElementById("vidStart"), stop: document.getElementById("vidStop") }
  };
  var segBtns = { audio: document.getElementById("mAudio"),
                  video: document.getElementById("mVideo"),
                  webaudio: document.getElementById("mWebAudio") };
  Object.keys(segBtns).forEach(function(k){
    segBtns[k].addEventListener("click", function(){
      method = k;
      Object.keys(segBtns).forEach(function(j){
        segBtns[j].classList.toggle("active", j === k);
      });
    });
  });

  function playWebAudio(phrase){
    if(!ctx){
      var AC = window.AudioContext || window.webkitAudioContext;
      if(!AC){ alert("Web Audio非対応のブラウザです"); return; }
      ctx = new AC();
    }
    var resume = ctx.state === "suspended" ? ctx.resume() : Promise.resolve();
    resume.then(function(){
      if(bufs[phrase]) return bufs[phrase];
      var b64 = els.audio[phrase].src.split(",")[1];
      var bin = atob(b64), arr = new Uint8Array(bin.length);
      for(var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
      return new Promise(function(res, rej){
        ctx.decodeAudioData(arr.buffer, function(d){ bufs[phrase] = d; res(d); }, rej);
      });
    }).then(function(b){
      var src = ctx.createBufferSource();
      src.buffer = b;
      src.connect(ctx.destination);
      src.start(0);
    });
  }

  function play(phrase){
    if(method === "webaudio"){ playWebAudio(phrase); return; }
    var el = els[method][phrase];
    try{ el.currentTime = 0; }catch(e){}
    el.play();
  }
  document.getElementById("btnStart").addEventListener("click", function(){ play("start"); });
  document.getElementById("btnStop").addEventListener("click", function(){ play("stop"); });
})();
</script>
