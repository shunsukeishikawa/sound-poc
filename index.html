<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>iOS Safari 音声検証</title>
<style>
  :root{
    --bg:#10141a;
    --panel:#1a212b;
    --line:#2b3542;
    --ink:#e8edf3;
    --sub:#8b97a6;
    --video:#4fd1a5;
    --audio:#5aa9f0;
    --webaudio:#e8b44f;
    --ok:#4fd1a5;
    --ng:#f0715a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{font-size:16px}
  body{
    background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
    line-height:1.55;
    padding:max(16px,env(safe-area-inset-top)) 16px max(32px,env(safe-area-inset-bottom));
    max-width:520px;margin:0 auto;
  }
  header{margin-bottom:20px}
  .eyebrow{
    font-family:ui-monospace,"SF Mono",Menlo,monospace;
    font-size:.7rem;letter-spacing:.14em;color:var(--sub);text-transform:uppercase;
  }
  h1{font-size:1.3rem;font-weight:700;margin-top:4px}
  .env{
    font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:.68rem;color:var(--sub);
    margin-top:8px;word-break:break-all;border-left:2px solid var(--line);padding-left:8px;
  }
  section{margin-bottom:22px}
  h2{
    font-size:.78rem;font-weight:600;color:var(--sub);letter-spacing:.08em;
    margin-bottom:10px;display:flex;align-items:center;gap:8px;
  }
  h2::after{content:"";flex:1;height:1px;background:var(--line)}

  .play-btn{
    display:flex;align-items:center;justify-content:space-between;
    width:100%;padding:16px 14px;margin-bottom:10px;
    background:var(--panel);border:1px solid var(--line);border-radius:10px;
    color:var(--ink);font-size:1rem;font-weight:600;font-family:inherit;
    cursor:pointer;border-left-width:4px;
  }
  .play-btn:active{filter:brightness(1.25)}
  .play-btn small{font-weight:400;font-size:.72rem;color:var(--sub)}
  .play-btn.video{border-left-color:var(--video)}
  .play-btn.audio{border-left-color:var(--audio)}
  .play-btn.webaudio{border-left-color:var(--webaudio)}

  .log-box{
    background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:10px 12px;font-family:ui-monospace,"SF Mono",Menlo,monospace;
    font-size:.72rem;max-height:180px;overflow-y:auto;
  }
  .log-box:empty::before{content:"まだ再生していません";color:var(--sub)}
  .log-line{padding:2px 0;border-bottom:1px dashed var(--line);word-break:break-all}
  .log-line:last-child{border-bottom:none}
  .log-line .t{color:var(--sub)}
  .log-line.err{color:var(--ng)}
  .tag{font-weight:700}
  .tag.video{color:var(--video)}
  .tag.audio{color:var(--audio)}
  .tag.webaudio{color:var(--webaudio)}

  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
  select,input[type=text]{
    width:100%;padding:11px 10px;background:var(--panel);color:var(--ink);
    border:1px solid var(--line);border-radius:8px;font-size:.85rem;font-family:inherit;
    appearance:none;-webkit-appearance:none;
  }
  .full{grid-column:1/-1}
  .record-btn,.export-btn{
    width:100%;padding:13px;border-radius:8px;font-size:.9rem;font-weight:700;
    font-family:inherit;cursor:pointer;border:none;
  }
  .record-btn{background:var(--ink);color:var(--bg)}
  .record-btn:active{filter:brightness(.85)}
  .export-btn{background:transparent;color:var(--ink);border:1px solid var(--line);margin-top:8px}

  table{width:100%;border-collapse:collapse;font-size:.72rem;margin-bottom:8px}
  th,td{padding:6px 4px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
  th{color:var(--sub);font-weight:600;white-space:nowrap}
  td.res-ok{color:var(--ok);font-weight:700}
  td.res-ng{color:var(--ng);font-weight:700}
  .empty-note{color:var(--sub);font-size:.78rem;padding:8px 0}

  textarea{
    width:100%;height:140px;background:var(--panel);color:var(--ink);
    border:1px solid var(--line);border-radius:8px;padding:10px;
    font-family:ui-monospace,Menlo,monospace;font-size:.68rem;margin-top:8px;display:none;
  }
  .toast{
    position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(80px);
    background:var(--ink);color:var(--bg);padding:10px 18px;border-radius:999px;
    font-size:.8rem;font-weight:600;transition:transform .25s;pointer-events:none;
  }
  .toast.show{transform:translateX(-50%) translateY(0)}
  @media (prefers-reduced-motion:reduce){.toast{transition:none}}
</style>
</head>
<body>

<header>
  <p class="eyebrow">Silent-switch behavior test</p>
  <h1>iOS Safari 音声検証</h1>
  <p class="env" id="envInfo"></p>
</header>

<section>
  <h2>再生（各方式）</h2>
  <button class="play-btn video" id="btnVideo">
    🎬 video要素で再生 <small>映像トラック付きmp4</small>
  </button>
  <button class="play-btn audio" id="btnAudio">
    🔊 audio要素で再生 <small>mp3</small>
  </button>
  <button class="play-btn webaudio" id="btnWebAudio">
    🎵 Web Audio APIで再生 <small>AudioContext</small>
  </button>
</section>

<section>
  <h2>自動ログ</h2>
  <div class="log-box" id="logBox"></div>
</section>

<section>
  <h2>判定を記録（耳で確認した結果）</h2>
  <div class="form-grid">
    <select id="selMethod">
      <option value="video">方式: video</option>
      <option value="audio">方式: audio</option>
      <option value="webaudio">方式: Web Audio</option>
    </select>
    <select id="selSilent">
      <option value="ON">サイレント: ON</option>
      <option value="OFF">サイレント: OFF</option>
    </select>
    <select id="selVolume">
      <option value="normal">音量: 通常</option>
      <option value="zero">音量: ゼロ</option>
    </select>
    <select id="selResult">
      <option value="heard">結果: 鳴った</option>
      <option value="not_heard">結果: 鳴らなかった</option>
    </select>
    <input type="text" id="txtMemo" class="full" placeholder="メモ（任意: iOSバージョン、機種など）">
  </div>
  <button class="record-btn" id="btnRecord">この判定を記録する</button>
</section>

<section>
  <h2>記録一覧</h2>
  <div id="resultArea"><p class="empty-note">まだ記録がありません</p></div>
  <button class="export-btn" id="btnExport">JSONをコピー / 表示</button>
  <textarea id="exportBox" readonly></textarea>
</section>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  var logBox = document.getElementById("logBox");
  var results = [];
  var vid = document.getElementById("mediaVideo");
  var aud = document.getElementById("mediaAudio");
  var ctx = null;
  var buf = null;

  document.getElementById("envInfo").textContent = navigator.userAgent;

  function ts(){
    var d = new Date();
    function p(n){return String(n).padStart(2,"0");}
    return p(d.getHours())+":"+p(d.getMinutes())+":"+p(d.getSeconds());
  }
  function log(method, msg, isErr){
    var line = document.createElement("div");
    line.className = "log-line" + (isErr ? " err" : "");
    line.innerHTML = '<span class="t">'+ts()+'</span> ' +
      (method ? '<span class="tag '+method+'">['+method+']</span> ' : "") + msg;
    logBox.appendChild(line);
    logBox.scrollTop = logBox.scrollHeight;
  }
  function toast(msg){
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(function(){t.classList.remove("show");}, 1600);
  }

  // ---- video ----
  document.getElementById("btnVideo").addEventListener("click", function(){
    try{ vid.currentTime = 0; }catch(e){}
    var p = vid.play();
    log("video", "play() 実行");
    if(p && p.then){
      p.then(function(){ log("video", "再生開始（play成功）"); })
       .catch(function(e){ log("video", "playエラー: "+e.name+" "+e.message, true); });
    }
  });

  // ---- audio ----
  document.getElementById("btnAudio").addEventListener("click", function(){
    try{ aud.currentTime = 0; }catch(e){}
    var p = aud.play();
    log("audio", "play() 実行");
    if(p && p.then){
      p.then(function(){ log("audio", "再生開始（play成功）"); })
       .catch(function(e){ log("audio", "playエラー: "+e.name+" "+e.message, true); });
    }
  });

  // ---- Web Audio ----
  function ensureCtx(){
    if(!ctx){
      var AC = window.AudioContext || window.webkitAudioContext;
      if(!AC){ log("webaudio","AudioContext 非対応",true); return Promise.reject(new Error("unsupported")); }
      ctx = new AC();
      log("webaudio","AudioContext 生成 state="+ctx.state);
    }
    var resume = ctx.state === "suspended" ? ctx.resume() : Promise.resolve();
    return resume.then(function(){
      if(buf) return buf;
      var b64 = aud.src.split(",")[1];
      var bin = atob(b64), arr = new Uint8Array(bin.length);
      for(var i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
      return new Promise(function(res,rej){
        ctx.decodeAudioData(arr.buffer, function(d){ buf=d; res(d); }, rej);
      });
    });
  }
  document.getElementById("btnWebAudio").addEventListener("click", function(){
    log("webaudio","play 実行");
    ensureCtx().then(function(b){
      var src = ctx.createBufferSource();
      src.buffer = b;
      src.connect(ctx.destination);
      src.start(0);
      log("webaudio","再生開始 state="+ctx.state);
    }).catch(function(e){
      log("webaudio","エラー: "+(e && e.message ? e.message : e), true);
    });
  });

  // ---- 判定記録 ----
  var labels = {
    method:{video:"video", audio:"audio", webaudio:"Web Audio"},
    silent:{ON:"ON", OFF:"OFF"},
    volume:{normal:"通常", zero:"ゼロ"},
    result:{heard:"鳴った", not_heard:"鳴らなかった"}
  };
  function renderResults(){
    var area = document.getElementById("resultArea");
    if(results.length === 0){
      area.innerHTML = '<p class="empty-note">まだ記録がありません</p>';
      return;
    }
    var html = '<table><tr><th>時刻</th><th>方式</th><th>ｻｲﾚﾝﾄ</th><th>音量</th><th>結果</th><th>メモ</th></tr>';
    results.forEach(function(r){
      html += '<tr><td>'+r.time+'</td><td><span class="tag '+r.method+'">'+labels.method[r.method]+'</span></td>'+
        '<td>'+r.silent+'</td><td>'+labels.volume[r.volume]+'</td>'+
        '<td class="'+(r.result==="heard"?"res-ok":"res-ng")+'">'+labels.result[r.result]+'</td>'+
        '<td>'+(r.memo?r.memo.replace(/</g,"&lt;"):"")+'</td></tr>';
    });
    area.innerHTML = html + '</table>';
  }
  document.getElementById("btnRecord").addEventListener("click", function(){
    results.push({
      time: ts(),
      method: document.getElementById("selMethod").value,
      silent: document.getElementById("selSilent").value,
      volume: document.getElementById("selVolume").value,
      result: document.getElementById("selResult").value,
      memo: document.getElementById("txtMemo").value.trim()
    });
    document.getElementById("txtMemo").value = "";
    renderResults();
    toast("記録しました");
  });

  // ---- エクスポート ----
  document.getElementById("btnExport").addEventListener("click", function(){
    var data = {
      exportedAt: new Date().toISOString(),
      userAgent: navigator.userAgent,
      records: results
    };
    var json = JSON.stringify(data, null, 2);
    var box = document.getElementById("exportBox");
    box.style.display = "block";
    box.value = json;
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(json)
        .then(function(){ toast("JSONをコピーしました"); })
        .catch(function(){ toast("下の欄から手動でコピーしてください"); });
    }else{
      toast("下の欄から手動でコピーしてください");
    }
  });
})();
</script>
